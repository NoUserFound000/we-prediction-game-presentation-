<html lang="en">
<head>

<title>World Cup Prediction Game Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0e0808; --bgGrad1:#1a0d0a; --panel:#171110; --panelHi:#1e1614;
    --border:#2c211d; --gold:#d6b14e; --goldSoft:#e7c66b; --goldDim:#8a7330;
    --maroon1:#4a1410; --maroon2:#2a0d0b; --cream:#f5efe6; --muted:#9a8c80;
    --mutedDim:#6e635b; --green:#3f9d56; --greenBg:#163a1f; --red:#c0473f;
    --disp:'Quicksand',sans-serif; --body:'DM Sans',sans-serif;
    --zh:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif; --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(120% 80% at 50% 0%, var(--bgGrad1) 0%, var(--bg) 55%);
    color:var(--cream); font-family:var(--body); min-height:100vh; position:relative;
  }
  /* background art layer */
  #bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  #bg svg{position:absolute; inset:0; width:100%; height:100%;}
  #bg::after{content:""; position:absolute; inset:0; background:
    radial-gradient(135% 100% at 50% 0%, transparent 0%, transparent 58%, var(--bg) 97%),
    linear-gradient(180deg, transparent 74%, var(--bg) 100%);}
  .wrap{position:relative; z-index:1;}

  /* hero */
  .hero{position:relative; overflow:hidden; text-align:center; padding:30px 20px 18px;
    background:linear-gradient(160deg,var(--maroon1) 0%,var(--maroon2) 60%,var(--bg) 100%);
    border-bottom:1px solid rgba(138,115,48,.45);}
  .hero .tex{position:absolute; inset:0; pointer-events:none;
    background-image:repeating-linear-gradient(115deg,rgba(255,255,255,.03) 0 1px,transparent 1px 22px);}
  .hero .in{position:relative;}
  .eyebrow{margin:0 0 6px; color:var(--gold); font-size:12px; font-weight:700; letter-spacing:6px; font-family:var(--disp);}
  .hero h1{margin:0; font-size:32px; font-weight:700; font-family:var(--disp); color:var(--cream); display:flex; align-items:center; justify-content:center; gap:10px;}
  .hero .sub{margin:6px 0 0; color:var(--muted); font-size:13.5px;}
  .legend{display:flex; gap:7px; justify-content:center; margin-top:8px; flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted);}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}

  /* tabs */
  .tabs{position:sticky; top:0; z-index:20; display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch;
    background:rgba(14,8,8,.96); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
  .tab{flex:1 0 auto; min-width:120px; padding:14px 16px; cursor:pointer; border:none; background:transparent;
    color:var(--muted); font-weight:600; font-size:13.5px; font-family:var(--disp);
    display:flex; align-items:center; justify-content:center; gap:7px; transition:all .25s;}
  .tab .ic{font-size:15px;}
  .tab.active{background:linear-gradient(180deg,var(--gold),var(--goldDim)); color:#241a05; font-weight:800;
    border-top-left-radius:10px; border-top-right-radius:10px;}

  .content{padding:26px 14px 70px;}
  .panel{display:none;} .panel.show{display:block;}

  .sec{text-align:center; margin-bottom:22px;}
  .sec .eb{margin:0; color:var(--gold); font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;}
  .sec h2{margin:4px 0 0; color:var(--cream); font-family:var(--disp); font-weight:700; font-size:25px;}
  .sec .sb{margin:6px 0 0; color:var(--muted); font-size:13px;}

  .maxw-pr{max-width:840px; margin:0 auto;}
  .maxw-me{max-width:1080px; margin:0 auto;}
  .maxw-gp{max-width:920px; margin:0 auto;}
  .maxw-ko{max-width:1000px; margin:0 auto;}

  .card{background:var(--panel); border:1px solid var(--border); border-radius:16px;}
  .promptbox{background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:22px;
    font-family:var(--mono); font-size:12.5px; line-height:1.8; color:#d8cdbf; white-space:pre-wrap;
    max-height:560px; overflow-y:auto;}
  .chips{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}
  .chip{display:flex; align-items:center; gap:7px; padding:6px 13px; border-radius:8px; background:var(--panelHi);}
  .chip span.nm{font-size:12px; font-weight:700;}
  .why{margin-top:16px; padding:15px; background:#2a1d0c; border:1px solid rgba(138,115,48,.55); border-radius:10px;}
  .why p{margin:0; color:var(--goldSoft); font-size:12px; line-height:1.65;}

  .mgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:18px;}
  .mcard{background:var(--panel); border-radius:14px; padding:20px; border:1px solid var(--border); position:relative; overflow:hidden;}
  .mcard .top{position:absolute; top:0; left:0; right:0; height:3px;}
  .mhead{display:flex; align-items:center; gap:9px; margin-bottom:13px;}
  .mhead h3{margin:0; font-family:var(--disp); font-size:17px; font-weight:700;}
  .pill{padding:3px 9px; border-radius:6px; font-size:10.5px; font-weight:800; letter-spacing:.6px; white-space:nowrap;}
  .bars{display:flex; flex-direction:column; gap:5px;}
  .bar{display:flex; align-items:center; gap:8px;}
  .bar .lbl{font-size:10.5px; color:var(--muted); width:150px; text-align:right; flex-shrink:0;}
  .bar .track{flex:1; background:var(--bg); border-radius:4px; height:18px; position:relative; overflow:hidden;}
  .bar .fill{height:100%; border-radius:4px;}
  .bar .val{position:absolute; right:6px; top:1px; font-size:10.5px; color:var(--cream); font-weight:700; font-family:var(--mono);}
  .approach{margin-top:13px; padding:11px; background:var(--bg); border-radius:8px;}
  .approach p{margin:0; color:var(--muted); font-size:11.5px; line-height:1.6;}
  .note{margin:9px 0 0; color:var(--goldSoft); font-size:11.5px; line-height:1.55;}
  .glance{margin-top:20px; background:var(--panel); border-radius:14px; padding:18px; border:1px solid var(--border);}
  .glance h3{margin:0 0 12px; color:var(--gold); font-family:var(--disp); font-weight:700; font-size:15px;}
  .ggrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:11px;}
  .gitem{background:var(--bg); border-radius:8px; padding:12px;}
  .gitem p.k{margin:0; color:var(--muted); font-size:10.5px;}
  .gitem p.v{margin:4px 0 0; color:var(--cream); font-size:13.5px; font-weight:700;}

  /* group nav + blocks */
  .gnav{position:sticky; top:50px; z-index:5; background:rgba(14,8,8,.95); backdrop-filter:blur(8px);
    padding:10px 4px; margin-bottom:14px; border-bottom:1px solid var(--border);
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center;}
  .gbtn{width:38px; height:34px; border-radius:8px; cursor:pointer; background:var(--panel);
    color:var(--muted); border:1px solid var(--border); font-weight:800; font-family:var(--disp); font-size:14px; transition:all .2s;}
  .gbtn.active{background:linear-gradient(135deg,var(--gold),var(--goldDim)); color:#241a05; border:none;}

  .gblock{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px 16px 16px; margin-bottom:20px; scroll-margin-top:96px;}
  .ghead{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .gbadge{width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--gold),var(--goldDim));
    color:#241a05; font-weight:800; font-family:var(--disp); font-size:18px; display:flex; align-items:center; justify-content:center;}
  .glabel{color:var(--muted); font-family:var(--disp); font-weight:700; font-size:14px; letter-spacing:3px;}
  .gflags{margin-left:auto; font-size:18px; letter-spacing:1px;}

  .tblwrap{overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:10px; border:1px solid var(--border);}
  table{width:100%; min-width:520px; border-collapse:collapse;}

  tbody td{padding:9px 10px; color:var(--cream); font-size:12.5px; font-weight:600; border-top:1px solid var(--border); white-space:nowrap;}
  tbody td.poscell{font-weight:800; font-size:11px; background:var(--panelHi); position:sticky; left:0;}
  tbody td.thirdlbl{color:var(--mutedDim); font-size:9.5px; font-weight:700; background:var(--panelHi); position:sticky; left:0;}
  td .fl{margin-right:5px;}

  .comments{display:flex; flex-direction:column; gap:7px; margin-top:13px;}
  .crow{display:flex; gap:9px; align-items:flex-start; padding:9px 12px; background:var(--bg); border-radius:10px;}
  .crow .who{font-size:10.5px; font-weight:800; font-family:var(--disp); min-width:62px; padding-top:2px; flex-shrink:0;}
  .crow p{margin:0; color:var(--cream); font-size:13.5px; line-height:1.65; font-family:var(--zh); font-weight:500;}

  .kcard h3{margin:0 0 14px; font-family:var(--disp); font-weight:700; font-size:18px;}

  .tchip{border-radius:9px; padding:7px 13px; display:flex; align-items:center; gap:8px;}
  .tchip .nm{color:var(--cream); font-size:14.5px; font-weight:800; font-family:var(--disp);}
  .kgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px;}
  .kmodel{background:var(--bg); border-radius:10px; padding:12px;}

  .kmodel .r .ml{font-size:12px; font-weight:700; font-family:var(--disp);}
  .kmodel .r .pk{color:var(--cream); font-size:13.5px; font-weight:800; font-family:var(--disp);}
  .kmodel p{margin:0; color:var(--muted); font-size:11px; line-height:1.55;}

  .footer{text-align:center; padding:18px 16px 34px; border-top:1px solid var(--border); position:relative; z-index:1;}
  .footer p{margin:0; color:var(--mutedDim); font-size:11px;}

  /* paywall */
  .gbtn.locked{opacity:.42;}
  .lockwrap{position:relative; max-width:920px; margin:0 auto;}
  .peek{position:relative; max-height:330px; overflow:hidden; filter:blur(5px); opacity:.5; pointer-events:none;
    -webkit-mask-image:linear-gradient(180deg,#000 0%,#000 28%,transparent 92%);
    mask-image:linear-gradient(180deg,#000 0%,#000 28%,transparent 92%);}
  .gate{text-align:center; max-width:560px; margin:-96px auto 0; position:relative; z-index:2; padding:0 18px 14px;}
  .gate.solo{margin:34px auto 0;}
  .lockcircle{width:66px; height:66px; border-radius:50%; background:#241a16; border:1px solid var(--border);

  .gate h3{margin:0 0 10px; font-family:var(--disp); font-weight:700; font-size:26px; color:var(--cream);}
  .gate p{margin:0 auto 18px; color:var(--muted); font-size:14px; line-height:1.6; max-width:430px;}
  .joinbtn{display:inline-block; width:100%; max-width:460px; padding:15px 24px; border:none; cursor:pointer;
    border-radius:12px; background:linear-gradient(180deg,#f7a83a,#e8870f); color:#2a1500;
    font-family:var(--disp); font-weight:800; font-size:16px; box-shadow:0 6px 22px rgba(232,135,15,.35); transition:filter .15s;}
  .joinbtn:hover{filter:brightness(1.06);}

  @media (max-width:520px){ .hero h1{font-size:26px;} .sec h2{font-size:21px;} }

</head>

# 🏆 2026 FIFA World Cup — Full Prediction Challenge

**(Copy everything below the line into Claude, ChatGPT, Gemini, and Deepseek — use the exact same text for all four so the comparison is fair.)**

-----

## Your role

You are an elite, evidence-driven football analyst. Today is June 2026 and the FIFA World Cup (co-hosted by the **USA, Canada and Mexico**, 11 June – 19 July 2026) is about to kick off. For the first time the tournament has **48 teams in 12 groups of four**. The top two from each group, plus the **8 best third-placed teams**, advance to the Round of 32.

I want you to run a **rigorous, transparent analysis** and then commit to a definitive predicted finishing order (1st → 4th) for **every group**, plus predict the **champion, runner-up, and third place**. Do not refuse to rank and do not leave ties — make the call.

## The confirmed groups (use these exactly — do not invent your own draw)

- **Group A:** Mexico, South Africa, South Korea, Czechia
- **Group B:** Canada, Switzerland, Qatar, Bosnia & Herzegovina
- **Group C:** Brazil, Morocco, Scotland, Haiti
- **Group D:** United States, Paraguay, Australia, Türkiye
- **Group E:** Germany, Ecuador, Ivory Coast, Curaçao
- **Group F:** Netherlands, Japan, Sweden, Tunisia
- **Group G:** Belgium, Egypt, Iran, New Zealand
- **Group H:** Spain, Uruguay, Saudi Arabia, Cape Verde
- **Group I:** France, Senegal, Norway, Iraq
- **Group J:** Argentina, Austria, Algeria, Jordan
- **Group K:** Portugal, Colombia, Uzbekistan, DR Congo
- **Group L:** England, Croatia, Ghana, Panama

-----

## PART 1 — Methodology (REQUIRED, do this first)

Before any rankings, explain **how** you are going to analyse. State the factors you weigh and roughly **how heavily** you weigh each (e.g. percentages or a tiered list). You are free to design your own framework — just make it rigorous and explicit. Reference factors you may use, adapt, or add to:

- **World Cup pedigree & track record** (historical results, knockout experience, "big-tournament" temperament).
- **Head-to-head history** between the teams in each group.
- **Host-condition suitability:** summer heat & humidity at venues like Houston, Miami, Dallas, Monterrey; **altitude** in Mexico City, Guadalajara, Toluca; long travel distances across three countries; and partisan home crowds for the USA, Canada and Mexico.
- **Tactical identity & system** (style of play, pressing, build-up, set-piece strength).
- **Manager/coach profile** — philosophy, in-tournament adaptability, big-game record.
- **Current squad quality, depth and cohesion.**
- **Key players' recent club form, fitness, injuries and suspensions.**
- **Momentum & qualifying form** heading into the tournament.
- **Motivation / hunger** (veterans' last dance, redemption arcs, first-timers' ceiling).

State any assumptions and, if you have web access, use the latest squad, injury and form information available as of June 2026.

## PART 2 — Group-by-group predictions (REQUIRED)

For **every** group A–L, give exactly this:

- **Predicted order:** 1st, 2nd, 3rd, 4th
- **Advancement call:** name the two qualifiers, and judge whether the 3rd-placed team makes the 8 best third-place spots — answer **Yes / Borderline / No**
- **Rationale (English):** 2–4 sentences explaining the key calls
- **廣東話點評 (Cantonese comment):** Write in **Traditional Chinese with a Cantonese spoken/colloquial tone** (口語化). Follow this style spec exactly:
  - Keep it to **1–2 short clauses, max ~25 characters**.
  - Each comment must justify **both the group winner AND the second-place pick** in one breath.
  - **Lead with the strongest causal reason** (e.g. 主場優勢 / 紙面實力 / 防守組織 / 大賽經驗), then name who they beat for the spot.
  - Use colloquial phrasing: 唔同級數, 搏到次名, 拋離成組, 冇懸念, 壓 (instead of 擊敗), etc.
  - Plain and factual — **no hype, no rhetorical filler, no full sentences**.
  - Mix in **English football terms** naturally where they read better (e.g. 靠Salah搏次名, Haaland).
  - Reference **real tactical or contextual factors** (種子隊, 死亡之組, 衛冕, 黑馬底子) rather than generic praise.
  - *(This field is required.)*

## PART 3 — Knockout & champion (REQUIRED)

Predict the following with a brief line of reasoning for each:

- **Champion** (winner of the final)
- **Runner-up** (finalist who loses the final)
- **Third place** (bronze — the losing semi-finalist who wins the 3rd-place match, or if you believe FIFA keeps the 3rd-place match for 2026, the better of the two losing semi-finalists)
- **Dark horse** — a team outside the traditional top 8 that you think will make a deep run

-----

## OUTPUT FORMAT — please follow exactly

Use this template verbatim so four different models' answers can be compared head-to-head.

```
## METHODOLOGY
[Your framework + factor weighting here]

## GROUP PREDICTIONS

### Group A
1st: [Team]
2nd: [Team]
3rd: [Team]  | 3rd-place qualification: [Yes / Borderline / No]
4th: [Team]
Rationale (EN): [2–4 sentences]
廣東話點評: [1–2 clauses, ≤25 chars, colloquial Cantonese per style spec]

### Group B
... (repeat the same block for every group through Group L)

## KNOCKOUT & CHAMPION
Champion: [Team] — [reason]
Runner-up: [Team] — [reason]
Third place: [Team] — [reason]
Dark horse: [Team] — [reason]
```

**Rules recap:** commit to a clear 1–4 order in every group; keep each group block identically structured; the Cantonese comment must follow the style spec (colloquial, ≤25 chars, causal + who-beats-who, no filler); predict champion, runner-up and third place; ground your claims in real, current information.

function buildGroupBlock(g){
  const order=ORDER[g], third=THIRD[g];
  const posLabel=["1ST","2ND","3RD","4TH"], posColor=[C.gold,C.green,"#b08d57",C.mutedDim];
  const head=`<tr><th class="pos">POS</th>${models.map(m=>`<th style="color:${AI[m].c}">${m}</th>`).join("")}</tr>`;
  const rows=[0,1,2,3].map(pos=>{
    const cells=models.map(m=>{
      const team=order[m][pos]; const cons=models.every(mm=>order[mm][pos]===team);
      return `<td style="background:${cons?C.greenBg+'55':'transparent'}"><span class="fl">${FLAG[team]}</span>${team}</td>`;
    }).join("");
    return `<tr><td class="poscell" style="color:${posColor[pos]}">${posLabel[pos]}</td>${cells}</tr>`;
  }).join("");
  const thirdRow=`<tr><td class="thirdlbl">3RD?</td>${models.map(m=>{const s=thirdStyle(third[m]);return `<td>${pill(s.color,s.bg,third[m])}</td>`;}).join("")}</tr>`;
  const comments=models.map(m=>`<div class="crow" style="border-left:3px solid ${AI[m].c}"><span class="who" style="color:${AI[m].c}">${m}</span><p>${ZH[g][m]}</p></div>`).join("");
  return `<div class="gblock" id="group-${g}">
    <div class="ghead"><span class="gbadge">${g}</span><span class="glabel">GROUP ${g}</span><span class="gflags">${GROUPS[g].map(t=>FLAG[t]).join(" ")}</span></div>
    <div class="tblwrap"><table><thead>${head}</thead><tbody>${rows}${thirdRow}</tbody></table></div>
    <div class="comments">${comments}</div></div>`;
}
function gateHTML(title,sub){
  return `<div class="lockcircle">🔒</div><h3>${title}</h3><p>${sub}</p><button class="joinbtn" onclick="joinEM()">Join Now</button>`;
}
function gotoPaywall(){ const el=document.getElementById("paywall"); if(el) el.scrollIntoView({behavior:"smooth",block:"center"}); }
function joinEM(){ alert("Welcome to the EM Family! 🎉  This is where your sign-up / subscription flow would go."); }
const FREE_GROUPS=["I","J","K"];
function renderPredictions(){
  const nav=`<div class="gnav">${groupKeys.map(g=> FREE_GROUPS.includes(g)
    ? `<button class="gbtn" id="gbtn-${g}" onclick="jumpGroup('${g}')">${g}</button>`
    : `<button class="gbtn locked" onclick="gotoPaywall()" title="Locked — join the EM Family">${g}</button>`).join("")}</div>`;
  const freeBlocks=FREE_GROUPS.map(buildGroupBlock).join("");
  const peek=buildGroupBlock("A");
  return `<div class="maxw-gp">${nav}
    <div class="sec"><p class="eb">Step 3</p><h2>Head-to-Head Predictions</h2></div>
    ${freeBlocks}
    <div class="lockwrap" id="paywall"><div class="peek">${peek}</div><div class="gate">${gateHTML("Join the EM Family","Unlock the full AI group-stage predictions for all 12 groups — every model's head-to-head call and Cantonese read.")}</div></div>
  </div>`;
}

/* ===== RENDER: Knockout (GATED) ===== */
function renderKnockout(){
  return `<div class="maxw-ko">
    <div class="sec"><p class="eb">Step 4</p><h2>Who Lifts the Trophy?</h2><p class="sb">Champion, runner-up, third place and dark-horse picks from all four models.</p></div>
    <div class="gate solo">${gateHTML("Join the EM Family","Get full access to every model's champion, runner-up, third-place and dark-horse predictions.")}</div>
  </div>`;
}

/* ===== TAB CONTROL ===== */
let built=[false,false,false,false];
const renderers=[renderPrompt,renderMethod,renderPredictions,renderKnockout];
let activeGroup="A";
function setTab(i){
  for(let t=0;t<4;t++){
    document.getElementById("tab-"+t).classList.toggle("active",t===i);
    document.getElementById("panel-"+t).classList.toggle("show",t===i);
  }
  if(!built[i]){ document.getElementById("panel-"+i).innerHTML=renderers[i](); built[i]=true; if(i===2) setActiveGroup("I"); }
  document.getElementById("bg").innerHTML=BG[i];
  window.scrollTo({top:0,behavior:"instant"});
}
function setActiveGroup(g){ activeGroup=g; groupKeys.forEach(k=>{const b=document.getElementById("gbtn-"+k); if(b)b.classList.toggle("active",k===g);}); }
function jumpGroup(g){ setActiveGroup(g); const el=document.getElementById("group-"+g); if(el)el.scrollIntoView({behavior:"smooth",block:"start"}); }

setTab(0); /* open on Prompt */
</script>
